<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 60px 40px 80px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* Back button */
    .back-btn {
      display: inline-block;
      margin-bottom: 48px;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      text-decoration: none;
      border: 1px solid #fff;
      padding: 6px 16px;
      letter-spacing: 0.08em;
      transition: background 0.15s, color 0.15s;
    }

    .back-btn:hover {
      background: #fff;
      color: #000;
    }

    .back-btn::before {
      content: '← ';
    }

    /* Title */
    h1 {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .divider {
      border: none;
      border-top: 1px solid #fff;
      margin-bottom: 48px;
    }

    /* Post card */
    .post {
      display: block;
      text-decoration: none;
      color: #fff;
      border: 1px solid #333;
      padding: 24px 28px;
      margin-bottom: 24px;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }

    .post:hover {
      border-color: #fff;
      background: #0a0a0a;
    }

    .post-meta {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 10px;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .post-preview {
      font-size: 0.9rem;
      line-height: 1.75;
      opacity: 0.7;
    }

    .post-arrow {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      opacity: 0.4;
    }

    /* Footer */
    footer {
      margin-top: 72px;
      font-size: 0.75rem;
      opacity: 0.35;
      letter-spacing: 0.1em;
      border-top: 1px solid #333;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">

    <a class="back-btn" href="index.html">Back</a>

    <h1>Blogs</h1>
    <hr class="divider" />

    <!-- POST 1 -->
    <a class="post" href="post-001.html">
      <div class="post-meta">May 13, 2026 &nbsp;·&nbsp; Entry #001</div>
      <div class="post-title">Am I the only one who ironically found a way to improve the Indom 2.0?</div>
      <span class="post-arrow">READ MORE →</span>
    </a>

    <footer>
      Blog &mdash; some thoughts go here for y'all to read.
    </footer>

  </div>
</body>
</html>
